<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0e3f"/>
      <stop offset="100%" style="stop-color:#2d2e82"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d2e82"/>
      <stop offset="100%" style="stop-color:#1abc9c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="60"/>
  <circle cx="1050" cy="120" r="130" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="40"/>
  <circle cx="150" cy="520" r="160" fill="none" stroke="rgba(26,188,156,0.08)" stroke-width="50"/>

  <!-- Accent bar top -->
  <rect x="80" y="80" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Trophy icon (simplified) -->
  <g transform="translate(80, 110)">
    <rect x="18" y="0" width="44" height="34" rx="6" fill="none" stroke="rgba(26,188,156,0.6)" stroke-width="3"/>
    <path d="M0 6 Q0 34 18 34" fill="none" stroke="rgba(26,188,156,0.5)" stroke-width="3"/>
    <path d="M80 6 Q80 34 62 34" fill="none" stroke="rgba(26,188,156,0.5)" stroke-width="3"/>
    <rect x="28" y="34" width="24" height="18" fill="none" stroke="rgba(26,188,156,0.5)" stroke-width="3"/>
    <rect x="16" y="52" width="48" height="5" rx="2" fill="rgba(26,188,156,0.5)"/>
  </g>

  <!-- Main title -->
  <text x="80" y="260" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">Prêmio Infosfera</text>
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.75)">Boas Práticas em Gestão da</text>
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.75)">Informação na Esfera Pública</text>

  <!-- Divider line -->
  <rect x="80" y="410" width="600" height="1" fill="rgba(255,255,255,0.12)"/>

  <!-- Badges -->
  <rect x="80" y="435" width="220" height="40" rx="20" fill="rgba(26,188,156,0.2)" stroke="rgba(26,188,156,0.4)" stroke-width="1"/>
  <text x="190" y="460" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1abc9c" text-anchor="middle">Edição 2026</text>

  <rect x="316" y="435" width="300" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="466" y="460" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle">Inscrições até 31 jul 2026</text>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.35)">infosfera-rewards.vercel.app</text>

  <!-- Infojus + LabRisk credits -->
  <text x="80" y="590" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.25)">Infojus.UFPR · LabRisk/UnB · Gratuito e ilimitado</text>
</svg>
